<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>To-Do 앱</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
        background: #f7f7f7;
      }
      h1 {
        text-align: center;
      }
      form {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      input[type="text"] {
        flex: 1;
        padding: 8px;
      }
      button {
        padding: 8px 12px;
        cursor: pointer;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 6px;
      }
      .completed {
        text-decoration: line-through;
        color: gray;
      }
      .actions {
        display: flex;
        gap: 6px;
      }
      .filter-section {
        margin-bottom: 16px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .filter-button {
        padding: 8px 16px;
        cursor: pointer;
        background: #f0f0f0;
        border: 1px solid #ccc;
        border-radius: 4px;
        transition: all 0.3s;
      }
      .filter-button.active {
        background: #4CAF50;
        color: white;
        border-color: #4CAF50;
      }
    </style>
    <script>
      let filterCompleted = false;

      function toggleFilter() {
        filterCompleted = !filterCompleted;
        const button = document.getElementById('filterBtn');
        button.classList.toggle('active', filterCompleted);
        applyFilter();
      }

      function applyFilter() {
        const items = document.querySelectorAll('ul li');
        items.forEach(item => {
          if (item.textContent.trim() === '할 일이 없습니다.') {
            item.style.display = 'flex';
            return;
          }
          const isCompleted = item.querySelector('span').classList.contains('completed');
          if (filterCompleted) {
            item.style.display = isCompleted ? 'flex' : 'none';
          } else {
            item.style.display = 'flex';
          }
        });

        // 표시된 항목이 없으면 "할 일이 없습니다" 메시지 표시
        const visibleItems = Array.from(document.querySelectorAll('ul li')).filter(
          item => item.style.display !== 'none' && item.textContent.trim() !== '할 일이 없습니다.'
        );
        const emptyMessage = document.querySelector('ul li:last-child');
        if (emptyMessage && emptyMessage.textContent.trim() === '할 일이 없습니다.') {
          emptyMessage.style.display = visibleItems.length === 0 ? 'flex' : 'none';
        }
      }
    </script>
  </head>
  <body>
    <h1>To-Do 앱</h1>

    <form method="post" action="{{ url_for('index') }}">
      <input type="text" name="title" placeholder="새 할 일을 입력하세요" required>
      <button type="submit">추가</button>
    </form>

    <div class="filter-section">
      <button type="button" id="filterBtn" class="filter-button" onclick="toggleFilter()">완료된 항목만 보기</button>
    </div>

    <ul>
      {% for task in tasks %}
      <li>
        <span class="{{ 'completed' if task.completed else '' }}">{{ task.title }}</span>
        <div class="actions">
          <form method="post" action="{{ url_for('toggle_task', task_id=task.id) }}">
            <button type="submit">{{ '미완료' if task.completed else '완료' }}</button>
          </form>
          <form method="post" action="{{ url_for('delete_task', task_id=task.id) }}">
            <button type="submit">삭제</button>
          </form>
        </div>
      </li>
      {% else %}
      <li>할 일이 없습니다.</li>
      {% endfor %}
    </ul>
  </body>
</html>
